<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebM to MP4 Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; color: #f8fafc; }
    .subtitle { font-size: 0.85rem; color: #94a3b8; margin-bottom: 1.5rem; }

    .drop-zone {
      border: 2px dashed #475569;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #6366f1;
      background: #1e293b99;
    }
    .drop-zone input { display: none; }
    .drop-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .drop-label { color: #94a3b8; font-size: 0.9rem; }
    .drop-label span { color: #818cf8; font-weight: 600; cursor: pointer; }

    #file-info {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #94a3b8;
      display: none;
    }
    #file-info.visible { display: block; }
    #file-info strong { color: #e2e8f0; }

    .btn {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.75rem;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover:not(:disabled) { background: #4f46e5; }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    #status-box { margin-top: 1.25rem; display: none; }
    #status-box.visible { display: block; }

    .status-label {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.4rem;
    }
    .progress-bar {
      height: 6px;
      background: #334155;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #6366f1;
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s ease;
    }
    #log {
      margin-top: 0.75rem;
      font-size: 0.78rem;
      color: #64748b;
      font-family: monospace;
      white-space: pre-wrap;
      max-height: 80px;
      overflow-y: auto;
    }

    #download-box {
      margin-top: 1.25rem;
      padding: 1rem;
      background: #022c22;
      border: 1px solid #166534;
      border-radius: 8px;
      display: none;
    }
    #download-box.visible { display: block; }
    #download-box p { font-size: 0.85rem; color: #4ade80; margin-bottom: 0.75rem; }
    .btn-green {
      display: block;
      width: 100%;
      padding: 0.65rem;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }
    .btn-green:hover { background: #15803d; }

    #error-box {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: #1c0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 6px;
      font-size: 0.83rem;
      color: #fca5a5;
      display: none;
    }
    #error-box.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>WebM → MP4 Converter</h1>
    <p class="subtitle">Client-side conversion via ffmpeg.wasm — no upload needed</p>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".webm,video/webm" />
      <div class="drop-icon">🎬</div>
      <p class="drop-label">Drop a <strong>.webm</strong> file or <span id="browse-label">browse</span></p>
    </div>

    <div id="file-info"></div>
    <div id="error-box"></div>

    <button class="btn" id="convert-btn" disabled>Convert to MP4</button>

    <div id="status-box">
      <p class="status-label" id="status-label">Loading ffmpeg.wasm…</p>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div id="log"></div>
    </div>

    <div id="download-box">
      <p>✅ Conversion complete!</p>
      <a class="btn-green" id="download-link" download="output.mp4">⬇ Download MP4</a>
    </div>
  </div>

  <!-- ffmpeg.wasm via ESM CDN (no npm build step needed) -->
  <script type="module">
    import { FFmpeg } from 'https://esm.sh/@ffmpeg/ffmpeg@0.12.15';
    import { fetchFile, toBlobURL } from 'https://esm.sh/@ffmpeg/util@0.12.2';

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const dropZone     = document.getElementById('drop-zone');
    const fileInput    = document.getElementById('file-input');
    const browseLabel  = document.getElementById('browse-label');
    const fileInfo     = document.getElementById('file-info');
    const convertBtn   = document.getElementById('convert-btn');
    const statusBox    = document.getElementById('status-box');
    const statusLabel  = document.getElementById('status-label');
    const progressFill = document.getElementById('progress-fill');
    const logEl        = document.getElementById('log');
    const downloadBox  = document.getElementById('download-box');
    const downloadLink = document.getElementById('download-link');
    const errorBox     = document.getElementById('error-box');

    let selectedFile = null;

    // ── File selection ────────────────────────────────────────────────────────
    browseLabel.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      clearError();
      if (!file) return;
      if (!file.name.endsWith('.webm') && file.type !== 'video/webm') {
        showError('Only .webm files are supported.');
        return;
      }
      selectedFile = file;
      fileInfo.className = 'visible';
      fileInfo.innerHTML = `<strong>${file.name}</strong> — ${(file.size / 1024 / 1024).toFixed(2)} MB`;
      convertBtn.disabled = false;
      downloadBox.className = '';
    }

    // ── Conversion ────────────────────────────────────────────────────────────
    convertBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      clearError();
      convertBtn.disabled = true;
      downloadBox.className = '';
      statusBox.className = 'visible';
      logEl.textContent = '';
      setProgress(0);

      const ffmpeg = new FFmpeg();

      // Log ffmpeg stderr output
      ffmpeg.on('log', ({ message }) => {
        logEl.textContent += message + '\n';
        logEl.scrollTop = logEl.scrollHeight;
      });

      // Progress (experimental — works for most simple transcodes)
      ffmpeg.on('progress', ({ progress, time }) => {
        const pct = Math.min(Math.round(progress * 100), 100);
        setProgress(pct);
        statusLabel.textContent = `Transcoding… ${pct}% (${(time / 1e6).toFixed(1)}s processed)`;
      });

      try {
        // Load ffmpeg-core from unpkg (single-thread build, no SharedArrayBuffer needed)
        statusLabel.textContent = 'Loading ffmpeg.wasm core…';
        setProgress(5);

        // Relay blob: blob origin = http://localhost (same-origin worker creation succeeds),
        // then imports the real worker from CDN via CORS (esm.sh allows all origins).
        const workerBlobURL = URL.createObjectURL(
          new Blob(
            [`import 'https://esm.sh/@ffmpeg/ffmpeg@0.12.15/es2022/worker.js';`],
            { type: 'text/javascript' }
          )
        );

        const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.9/dist/umd';
        await ffmpeg.load({
          coreURL       : await toBlobURL(`${baseURL}/ffmpeg-core.js`,   'text/javascript'),
          wasmURL       : await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
          classWorkerURL: workerBlobURL,
        });

        setProgress(20);
        statusLabel.textContent = 'Writing input file…';
        await ffmpeg.writeFile('input.webm', await fetchFile(selectedFile));

        setProgress(25);
        statusLabel.textContent = 'Transcoding…';

        // Core conversion command:
        //   -i input.webm        — input file
        //   -c:v libx264         — H.264 video codec
        //   -preset fast         — speed/quality tradeoff
        //   -crf 23              — constant quality (18=best, 28=worst)
        //   -c:a aac             — AAC audio codec
        //   -b:a 128k            — audio bitrate
        //   -movflags +faststart — put moov atom at front (good for web)
        await ffmpeg.exec([
          '-i', 'input.webm',
          '-c:v', 'libx264',
          '-preset', 'fast',
          '-crf', '23',
          '-c:a', 'aac',
          '-b:a', '128k',
          '-movflags', '+faststart',
          'output.mp4',
        ]);

        setProgress(95);
        statusLabel.textContent = 'Reading output…';
        const data = await ffmpeg.readFile('output.mp4');

        const blob = new Blob([data.buffer], { type: 'video/mp4' });
        const url  = URL.createObjectURL(blob);

        downloadLink.href = url;
        downloadLink.download = selectedFile.name.replace(/\.webm$/i, '.mp4');
        downloadBox.className = 'visible';

        setProgress(100);
        statusLabel.textContent = 'Done!';

        // Clean up virtual FS
        await ffmpeg.deleteFile('input.webm');
        await ffmpeg.deleteFile('output.mp4');

      } catch (err) {
        showError(`Conversion failed: ${err.message}`);
        statusBox.className = '';
      } finally {
        convertBtn.disabled = false;
      }
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setProgress(pct) {
      progressFill.style.width = pct + '%';
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.className = 'visible';
    }

    function clearError() {
      errorBox.textContent = '';
      errorBox.className = '';
    }
  </script>
</body>
</html>
